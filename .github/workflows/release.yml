name: release

# Cut a release by pushing a numeric `X.Y.Z` tag (e.g. `0.1.0`), matching the
# package version in Cargo.toml. Pre-release tags may use `-alphaN`, `-betaN`,
# or `-rcN`; build metadata is intentionally not accepted because Android
# versionCode cannot represent it without an explicit override. Builds the Rust
# binaries for the four cross targets, builds and signs the Android APK, then
# publishes a GitHub release with checksums, license files, and generated
# third-party notices.
#
# Required environment secrets in the `release` environment:
#   SLT_KEYSTORE_BASE64   base64 of the release keystore (.jks)
#   SLT_STORE_PASSWORD    keystore password
#   SLT_KEY_ALIAS         key alias inside the keystore
#   SLT_KEY_PASSWORD      key password
# Optional, for a detached signature over the checksums:
#   repository or `release` environment variable SLT_RELEASE_SIGN=true
#   SLT_RELEASE_GPG_KEY   ASCII-armored private key (with passphrase via
#                         SLT_RELEASE_GPG_PASSPHRASE)

on:
  push:
    tags:
      # Numeric version tags, e.g. 0.1.0 or 1.12.3 (also matches pre-release
      # suffixes like 0.1.0-rc1). Glob syntax, not regex.
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (e.g. 0.1.1)."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: never
  CARGO_ABOUT_VERSION: "0.9.1"
  CARGO_NDK_VERSION: "4.1.2"
  CARGO_ZIGBUILD_VERSION: "0.23.0"
  ZIGLANG_VERSION: "0.16.0"
  UNIFFI_BINDGEN_VERSION: "0.32.0"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.0"
  # Tag (or manual input) used to name artifacts and the release.
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  validate-release:
    name: validate release ref
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.verify.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.VERSION }}

      - name: Verify tag format and workspace version
        id: verify
        run: |
          release_sha="$(git rev-parse HEAD)"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

          workspace_version="$(sed -n 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' Cargo.toml | head -n 1)"
          if [ -z "$workspace_version" ]; then
            echo "::error::could not read [workspace.package] version from Cargo.toml"
            exit 1
          fi
          case "$VERSION" in
            *[!0123456789.abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ+-]*)
              echo "::error::release tag $VERSION contains unsupported SemVer characters"
              exit 1
              ;;
          esac
          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.?([1-9]|[12][0-9]))?$'; then
            echo "::error::release tag $VERSION must be X.Y.Z, optionally with -alphaN, -betaN, or -rcN (N=1..29)"
            exit 1
          fi
          if [ "$workspace_version" != "$VERSION" ]; then
            echo "::error::release tag $VERSION does not match Cargo.toml version $workspace_version"
            exit 1
          fi

  check-rust:
    name: rust build, test, clippy
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_sha }}

      - name: Install C/C++ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config clang libclang-dev golang-go perl

      - uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Clippy workspace
        run: cargo clippy --workspace --all-targets --locked

  check-android:
    name: android unit test and lint
    needs: validate-release
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_sha }}

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }} ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Export NDK location
        run: |
          ndk="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          [ -d "$ndk" ] || { echo "::error::NDK $ndk not found after setup"; exit 1; }
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk and uniffi-bindgen (pinned to the workspace)
        run: |
          cargo install cargo-ndk --version "$CARGO_NDK_VERSION" --locked
          cargo install uniffi --version "$UNIFFI_BINDGEN_VERSION" --locked --features cli --bin uniffi-bindgen

      - name: Run Android checks
        working-directory: android
        run: ./gradlew testDebugUnitTest lintDebug --no-daemon --stacktrace

  build-linux:
    name: ${{ matrix.artifact }}
    needs: [validate-release, check-rust]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # gnu.* targets pin glibc 2.17, so the dynamic binaries run on any
          # distro with glibc >= 2.17 (CentOS 7 / Debian 8 era forward).
          - zig-target: x86_64-unknown-linux-gnu.2.17
            rust-target: x86_64-unknown-linux-gnu
            artifact: x86_64-linux-gnu
          - zig-target: aarch64-unknown-linux-gnu.2.17
            rust-target: aarch64-unknown-linux-gnu
            artifact: aarch64-linux-gnu
          # musl targets are fully static: one self-contained file per arch.
          - zig-target: x86_64-unknown-linux-musl
            rust-target: x86_64-unknown-linux-musl
            artifact: x86_64-linux-musl
          - zig-target: aarch64-unknown-linux-musl
            rust-target: aarch64-unknown-linux-musl
            artifact: aarch64-linux-musl
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_sha }}

      - name: Install C/C++ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config clang libclang-dev golang-go perl python3-venv

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install cargo-zigbuild
        run: |
          venv="$RUNNER_TEMP/zigbuild-venv"
          python3 -m venv "$venv"
          "$venv/bin/pip" install --quiet --upgrade pip
          "$venv/bin/pip" install --quiet \
            "ziglang==$ZIGLANG_VERSION" \
            "cargo-zigbuild==$CARGO_ZIGBUILD_VERSION"
          echo "$venv/bin" >> "$GITHUB_PATH"

      - name: Build (cargo zigbuild)
        run: cargo zigbuild --release --locked --target "${{ matrix.zig-target }}" -p slt-client -p slt-server -p slt-cli

      - name: Stage artifact
        run: |
          staging="slt-${{ env.VERSION }}-${{ matrix.artifact }}"
          mkdir -p "stage/$staging"
          cp "target/${{ matrix.rust-target }}/release/slt-client" "stage/$staging/"
          cp "target/${{ matrix.rust-target }}/release/slt-server" "stage/$staging/"
          cp "target/${{ matrix.rust-target }}/release/slt" "stage/$staging/"
          cp LICENSE "stage/$staging/"
          tar -C stage -czf "$staging.tar.gz" "$staging"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.artifact }}
          path: slt-*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-android:
    name: android-arm64-v8a (signed apk)
    needs: [validate-release, check-android]
    runs-on: ubuntu-latest
    environment: release
    env:
      ANDROID_NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_sha }}

      - uses: gradle/actions/wrapper-validation@v4

      - name: Verify signing secrets are configured
        env:
          SLT_KEYSTORE_BASE64: ${{ secrets.SLT_KEYSTORE_BASE64 }}
          SLT_STORE_PASSWORD: ${{ secrets.SLT_STORE_PASSWORD }}
          SLT_KEY_ALIAS: ${{ secrets.SLT_KEY_ALIAS }}
          SLT_KEY_PASSWORD: ${{ secrets.SLT_KEY_PASSWORD }}
        run: |
          missing=0
          for name in SLT_KEYSTORE_BASE64 SLT_STORE_PASSWORD SLT_KEY_ALIAS SLT_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty; configure all Android signing secrets in the release environment before cutting a release."
              missing=1
            fi
          done
          exit "$missing"

      - name: Decode signing keystore
        env:
          KEYSTORE: ${{ secrets.SLT_KEYSTORE_BASE64 }}
        run: |
          keystore_file="$RUNNER_TEMP/slt-release.jks"
          echo "$KEYSTORE" | base64 -d > "$keystore_file"
          echo "SLT_KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }} ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Export Android SDK tool locations
        run: |
          build_tools="$ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}"
          [ -x "$build_tools/apksigner" ] || { echo "::error::apksigner not found in $build_tools"; exit 1; }
          ndk="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          [ -d "$ndk" ] || { echo "::error::NDK $ndk not found after setup"; exit 1; }
          echo "ANDROID_BUILD_TOOLS=$build_tools" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk and uniffi-bindgen (pinned to the workspace)
        run: |
          cargo install cargo-ndk --version "$CARGO_NDK_VERSION" --locked
          cargo install uniffi --version "$UNIFFI_BINDGEN_VERSION" --locked --features cli --bin uniffi-bindgen

      - name: Build release APK
        working-directory: android
        env:
          SLT_STORE_PASSWORD: ${{ secrets.SLT_STORE_PASSWORD }}
          SLT_KEY_ALIAS: ${{ secrets.SLT_KEY_ALIAS }}
          SLT_KEY_PASSWORD: ${{ secrets.SLT_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK and Android license report
        run: |
          mkdir -p stage
          apk="$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*.apk' | sort | head -n 1)"
          if [ -z "$apk" ]; then
            echo "::error::could not find a signed release APK"
            exit 1
          fi
          "$ANDROID_BUILD_TOOLS/apksigner" verify --verbose --print-certs "$apk"
          android_licenses="android/app/build/reports/licensee/androidRelease/artifacts.json"
          android_license_validation="android/app/build/reports/licensee/androidRelease/validation.txt"
          if [ ! -f "$android_licenses" ] || [ ! -f "$android_license_validation" ]; then
            echo "::error::could not find Android licensee reports"
            exit 1
          fi
          cp "$apk" "stage/slt-${{ env.VERSION }}-android-arm64-v8a.apk"
          cp "$android_licenses" "stage/slt-${{ env.VERSION }}-android-third-party-licenses.json"
          cp "$android_license_validation" "stage/slt-${{ env.VERSION }}-android-license-validation.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: stage/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [validate-release, build-linux, build-android]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_sha }}

      - name: Verify release tag still points to validated commit
        run: |
          git fetch --force --depth=1 origin "refs/tags/$VERSION:refs/tags/$VERSION"
          tag_sha="$(git rev-parse "refs/tags/$VERSION^{commit}")"
          if [ "$tag_sha" != "${{ needs.validate-release.outputs.release_sha }}" ]; then
            echo "::error::release tag $VERSION moved from ${{ needs.validate-release.outputs.release_sha }} to $tag_sha during this workflow run"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.apk' -o -name '*.json' -o -name '*.txt' \) \
            -exec cp {} release-assets/ \;
          cp LICENSE release-assets/
          # License text for the C/C++ statically compiled into the binaries.
          cp vendor/boring/LICENSE release-assets/LICENSE.BoringSSL
          cp vendor/boring-sys/LICENSE-MIT release-assets/LICENSE.boring-sys
          cp vendor/quiche/COPYING release-assets/LICENSE.quiche

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-about
        # The `cli` feature gates the `cargo-about` binary (non-default since 0.9).
        run: cargo install cargo-about --version "$CARGO_ABOUT_VERSION" --locked --features cli

      - name: Generate third-party notices (Rust dependency tree)
        run: cargo about generate .github/about/template.hbs --locked -o release-assets/THIRD_PARTY_NOTICES.html

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS

      - name: Sign checksums (if release signing is enabled)
        if: ${{ vars.SLT_RELEASE_SIGN == 'true' }}
        env:
          GPG_KEY: ${{ secrets.SLT_RELEASE_GPG_KEY }}
          GPG_PASS: ${{ secrets.SLT_RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_KEY" ] || [ -z "$GPG_PASS" ]; then
            echo "::error::SLT_RELEASE_SIGN=true requires SLT_RELEASE_GPG_KEY and SLT_RELEASE_GPG_PASSPHRASE secrets."
            exit 1
          fi
          echo "$GPG_KEY" | gpg --import --batch
          echo "$GPG_PASS" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --detach-sign --armor release-assets/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          prerelease: ${{ contains(env.VERSION, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
